name: Update EliteCC Event Count

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes (adjust if needed)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch events and update eventcount.json
        shell: bash
        run: |
          set -euo pipefail

          URL="https://api.truckersmp.com/v2/vtc/81143/events/attending"
          echo "Fetching: $URL"

          RESP="$(curl -sS "$URL")"

          echo "Response first 400 chars:"
          echo "$RESP" | head -c 400
          echo
          echo "----"

          COUNT="$(
            echo "$RESP" | jq '
              if type=="array" then length
              elif .response then (.response | length)
              elif .data then (.data | length)
              elif .events then (.events | length)
              elif .results then (.results | length)
              else 0 end
            '
          )"

          echo "Count computed: $COUNT"

          UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --argjson n "$COUNT" \
            --arg t "$UPDATED_AT" \
            '{ eventsThisMonth: $n, updatedAt: $t, source: "events/attending" }' \
            > eventcount.json

          echo "Written eventcount.json:"
          cat eventcount.json

      - name: Commit if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit (eventcount.json unchanged)."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add eventcount.json
          git commit -m "Update Events This Month count"
          git push
