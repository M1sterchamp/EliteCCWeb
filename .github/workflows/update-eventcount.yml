name: Update EliteCC Event Count

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch events and update eventcount.json
        shell: bash
        run: |
          set -euo pipefail

          URL="https://api.truckersmp.com/v2/vtc/81143/events/attending"
          RESP="$(curl -sS "$URL")"

          COUNT="$(
            echo "$RESP" | jq '
              if type=="array" then length
              elif .response then (.response | length)
              elif .data then (.data | length)
              elif .events then (.events | length)
              elif .results then (.results | length)
              else 0 end
            '
          )"

          UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --argjson n "$COUNT" \
            --arg t "$UPDATED_AT" \
            '{ eventsThisMonth: $n, updatedAt: $t, source: "events/attending" }' \
            > eventcount.json

          echo "eventcount.json now:"
          cat eventcount.json

          if [ -f "eventcount.json" ]; then
            echo "eventcount.json exists locally in workspace."
          else
            echo "eventcount.json missing in workspace!"
            exit 1
          fi

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add eventcount.json

          # Always commit (even if contents identical but updatedAt differs)
          git commit -m "Update Events This Month count" || echo "Nothing to commit"
          git push
