name: Update EliteCC Event Counts

on:
  schedule:
    - cron: "0 2 * * *" # every 24 hours at 02:00 UTC (adjust if you want)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch events and update eventcount.json
        shell: bash
        run: |
          set -euo pipefail

          URL="https://api.truckersmp.com/v2/vtc/81143/events/attending"
          RESP="$(curl -sS "$URL")"

          EVENTS_JSON="$(echo "$RESP" | jq -c '.response // []')"

          OVERALL_COUNT="$(echo "$EVENTS_JSON" | jq 'length')"

          # Compare YYYY-MM directly from meetup_at (format: "YYYY-MM-DD HH:MM:SS")
          THIS_MONTH_COUNT="$(
            echo "$EVENTS_JSON" | jq -r --arg now "$(date -u +'%Y-%m')" '
              [
                .[]
                | select((.meetup_at // "") | .[0:7] == $now)
              ] | length
            '
          )"

          UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          jq -n \
            --argjson overall "$OVERALL_COUNT" \
            --argjson month "$THIS_MONTH_COUNT" \
            --arg t "$UPDATED_AT" \
            '{ eventsThisMonth: $month, eventsOverall: $overall, updatedAt: $t, source: "events/attending" }' \
            > eventcount.json

          echo "eventcount.json now:"
          cat eventcount.json

      - name: Commit if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add eventcount.json
          git commit -m "Update EliteCC event counts"
          git push
          
