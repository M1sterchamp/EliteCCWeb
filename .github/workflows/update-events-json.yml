name: Update EliteCC Events JSON

on:
  schedule:
    - cron: "0 2 * * *" # every 24 hours at 02:00 UTC (adjust if you want)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch TruckersMP events and write events.json
        shell: bash
        run: |
          set -euo pipefail

          URL="https://api.truckersmp.com/v2/vtc/81143/events/attending"
          RESP="$(curl -sS "$URL")"

          echo "$RESP" | jq '.' > events.json

          echo "events.json written:"
          jq '{ count: (.response | length), error: .error }' events.json

      - name: Commit & push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add events.json
          git commit -m "Update events.json"
          git push
