name: Update EliteCC Minimal Events JSON (Forced Commit)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show branch/ref + generate events.json
        shell: bash
        run: |
          set -euo pipefail

          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "Current git branch:"
          git branch --show-current || true

          URL="https://api.truckersmp.com/v2/vtc/81143/events/attending"
          RESP="$(curl -sS "$URL")"

          # Force a change every run by including updatedAt
          UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          echo "$RESP" | jq --arg t "$UPDATED_AT" '{
            updatedAt: $t,
            events: [
              .response[]? | {
                id: .id,
                title: .name,
                start: .start_at,
                url: .url
              }
            ]
          }' > events.json

          echo "events.json preview:"
          cat events.json | head -n 20

      - name: Commit & push (force)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Always commit (even if content somehow matches)
          git add events.json
          git commit -m "Force update events.json"
          git push
