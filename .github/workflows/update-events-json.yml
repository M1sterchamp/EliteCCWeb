name: Update EliteCC Minimal Events JSON

on:
  schedule:
    - cron: "0 2 * * *" # every 24 hours at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch events and write minimal events.json (forced shape)
        shell: bash
        run: |
          set -euo pipefail

          URL="https://api.truckersmp.com/v2/vtc/81143/events/attending"
          echo "Fetching: $URL"

          RESP="$(curl -sS "$URL")"

          # Force minimal schema exactly:
          # events.json => [
          #   { "id": ..., "title": ..., "start": ..., "url": ... },
          #   ...
          # ]
          echo "$RESP" | jq '[
            .response[]? | {
              id: .id,
              title: .name,
              start: .start_at,
              url: .url
            }
          ]' > events.json

          echo "events.json written:"
          echo "Count:"
          jq 'length' events.json

          echo "First item:"
          jq '.[0]' events.json || true

      - name: Commit & push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add events.json
          git commit -m "Update minimal events.json"
          git push
