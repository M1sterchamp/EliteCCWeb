name: Update Discord Invite Member Count (Forced)

on:
  schedule:
    - cron: "0 2 * * *" # every 24 hours at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Discord invite and write discordMemberCount.json
        shell: bash
        run: |
          set -euo pipefail

          URL="https://discord.com/api/v9/invites/EliteConvoys?with_counts=true&with_expiration=true"
          RESP="$(curl -sS "$URL")"

          MEMBER_COUNT="$(echo "$RESP" | jq '.profile.member_count // 0')"

          UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Force content to update every run so git always detects changes
          # (even if the member count is identical)
          jq -n \
            --argjson memberCount "$MEMBER_COUNT" \
            --arg updatedAt "$UPDATED_AT" \
            '{ memberCount: $memberCount, updatedAt: $updatedAt }' \
            > discordMemberCount.json

          echo "discordMemberCount.json:"
          cat discordMemberCount.json

      - name: Commit & push (forced)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add discordMemberCount.json
          git commit -m "Force update discordMemberCount.json" || echo "Commit failed (maybe no changes)"
          git push
